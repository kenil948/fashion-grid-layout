<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Grid Layout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="main">
        <div id="left-top-left">
            <div id="square"></div>
        </div>
        <div id="left-top-right">
            <h4>Menu</h4>
            <h5>Home page</h5>
            <h5>Portfolio</h5>
            <h5>Fashion week -&copy;2021</h5>
            <h5>News/Articles</h5>
            <h5>Contact</h5>
            <h6><i class="fa-solid fa-bars"></i></h6>
        </div>
        <div id="left-center">
            <h1>Select</h1>
            <h1>Fashion</h1>
            <h1>Mod.05 -</h1>
            <h1>Scene</h1>
        </div>
        <div id="left-bottom">
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quod iure aliquam cumque molestias illum, est
                consectetur suscipit? Sit, itaque architecto.</p>
        </div>
        <div id="right">
            <div class="video-wrapper">
                <video src="./assets/videos/video.mp4" autoplay loop muted playsinline preload="metadata"></video>
                <div class="overlay"></div>
            </div>
            <div id="arrow">
                <i class="fa-solid fa-arrow-right"></i>
            </div>
        </div>

    </div>
</body>

</html>
